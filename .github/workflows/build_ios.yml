name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-13
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '14.3.1'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: App源码/ai_stock_picker
        run: |
          flutter doctor -v
          flutter pub get

      - name: Build iOS
        working-directory: App源码/ai_stock_picker
        run: |
          flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: App源码/ai_stock_picker
        run: |
          RUNNER_APP=$(find build/ios -name "Runner.app" -type d | head -1)
          mkdir -p Payload
          cp -R "$RUNNER_APP" Payload/
          zip -qr 蓝图极智-v2.0.2.ipa Payload/
          ls -lh 蓝图极智-v2.0.2.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-iOS-IPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2.ipa
          retention-days: 7
