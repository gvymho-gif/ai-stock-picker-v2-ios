name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      # 清理硬编码路径的 Flutter 配置文件
      - name: 清理本地 Flutter 配置
        working-directory: App源码/ai_stock_picker
        run: |
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          rm -f .flutter-plugins .flutter-plugins-dependencies
          rm -f ios/Podfile.lock
          rm -rf ios/Pods 2>/dev/null || true

      # 修复 1：podhelper.rb File.exists? → File.exist?
      - name: 修复 1 - Ruby 3.x 兼容
        run: |
          find $FLUTTER_ROOT/packages/flutter_tools/bin/ -name "podhelper*" -exec sed -i '' 's/File\.exists?/File.exist?/g' {} \;

      # 修复 2：绕过 CocoaPods Swift 校验
      - name: 修复 2 - 绕过 CocoaPods Swift 校验
        run: |
          VALIDATOR=$(find /opt/homebrew/lib/ruby/gems -name "target_validator.rb" -path "*/cocoapods/*" 2>/dev/null | head -1)
          if [ -n "$VALIDATOR" ] && [ -f "$VALIDATOR" ]; then
            ruby -e "
              file = ARGV[0]
              lines = File.readlines(file)
              new_lines = []
              lines.each do |line|
                new_lines << line
                new_lines << \"  return\n\" if line =~ /^\s*def verify_swift_pods_swift_version\b/
              end
              File.write(file, new_lines.join)
            " "$VALIDATOR"
          fi

      - name: flutter pub get
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      # 先用 xcode_backend.sh 生成 Flutter 编译产物
      - name: 构建 Flutter 编译产物 (assemble)
        working-directory: App源码/ai_stock_picker/ios
        run: |
          /bin/sh "$FLUTTER_ROOT/packages/flutter_tools/bin/xcode_backend.sh" build
          echo "=== 检查 Flutter framework ==="
          ls -la Flutter/ 2>/dev/null || echo "Flutter 目录不存在"
          ls -la Flutter/App.framework/ 2>/dev/null || echo "App.framework 不存在"
          find build -name "*.framework" -type d 2>/dev/null | head -5 || echo "无 framework"

      # 运行 pod install
      - name: pod install
        working-directory: App源码/ai_stock_picker/ios
        run: pod install

      # 直接用 xcodebuild 构建（不依赖 flutter build 命令）
      - name: Xcode build (unsigned)
        working-directory: App源码/ai_stock_picker/ios
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=ios \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package IPA
        working-directory: App源码/ai_stock_picker/ios
        run: |
          APP=$(find build -name "Runner.app" -type d | head -1)
          echo "找到 App: $APP"
          if [ -z "$APP" ]; then
            echo "❌ Runner.app 未找到！"
            find build -type d | head -20
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -9qr /tmp/蓝图极智-v2.0.2-unsigned.ipa Payload/
          ls -lh /tmp/蓝图极智-v2.0.2-unsigned.ipa
          cp /tmp/蓝图极智-v2.0.2-unsigned.ipa "$GITHUB_WORKSPACE/App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-unsigned-iPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa
          retention-days: 7
