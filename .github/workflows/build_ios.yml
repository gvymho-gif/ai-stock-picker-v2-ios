name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: App源码/ai_stock_picker
        run: |
          flutter clean
          flutter pub get

      - name: Build iOS for Simulator
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --debug --no-codesign --simulator

      - name: Build iOS Device
        working-directory: App源码/ai_stock_picker
        run: |
          # Try to get the simulator build first, then try device
          flutter build ios --release --no-codesign || true

      - name: Locate Runner.app
        id: find_app
        working-directory: App源码/ai_stock_picker
        run: |
          RUNNER=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "runner_path=$RUNNER" >> $GITHUB_OUTPUT
          echo "Found: $RUNNER"

      - name: Package IPA
        if: steps.find_app.outputs.runner_path != ''
        working-directory: App源码/ai_stock_picker
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R "${{ steps.find_app.outputs.runner_path }}" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qr "../../蓝图极智-v2.0.2.ipa" Payload/

      - name: Upload IPA
        if: steps.find_app.outputs.runner_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-v2.0.2
          path: App源码/ai_stock_picker/build/ios/蓝图极智-v2.0.2.ipa
