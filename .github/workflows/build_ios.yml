name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-14
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      # 关键修复：Flutter 3.0.0 的 podhelper.rb 用了 File.exists?，
      # 在 macOS 14 的 Ruby 3.3 里已被移除，必须替换为 File.exist?
      - name: Patch Flutter SDK - Ruby 3.x 兼容
        run: |
          echo "=== 修复前 ==="
          grep -n 'File\.exists?' $FLUTTER_ROOT/packages/flutter_tools/bin/podhelper.rb || echo "(未找到 File.exists?，可能已修复)"
          echo ""
          echo "=== 执行修复 ==="
          find $FLUTTER_ROOT/packages/flutter_tools/bin/ -name "podhelper*" -exec sed -i '' 's/File\.exists?/File.exist?/g' {} \;
          echo ""
          echo "=== 验证修复 ==="
          grep -n 'File\.exists?' $FLUTTER_ROOT/packages/flutter_tools/bin/podhelper.rb && echo "⚠️ 仍有 File.exists? 残留!" || echo "✅ 已全部替换为 File.exist?"

      - name: Install dependencies
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      - name: Build iOS (unsigned)
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: App源码/ai_stock_picker
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "找到 App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -9qr 蓝图极智-v2.0.2-unsigned.ipa Payload/
          ls -lh 蓝图极智-v2.0.2-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-unsigned-iPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa
          retention-days: 7
