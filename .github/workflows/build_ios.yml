name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-14
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      # Flutter 3.0.0 的 podhelper.rb 用了已废弃的 File.exists?
      - name: Patch Flutter SDK - Ruby 3.x 兼容
        run: |
          find $FLUTTER_ROOT/packages/flutter_tools/bin/ -name "podhelper*" -exec sed -i '' 's/File\.exists?/File.exist?/g' {} \;
          echo "✅ podhelper.rb 已修复"

      - name: Install dependencies
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      # workmanager pod 的 podspec 没声明 Swift 版本，
      # 而新版 CocoaPods 强制校验此字段。直接往 podspec 里注入。
      - name: Patch workmanager podspec - 注入 Swift 版本
        working-directory: App源码/ai_stock_picker
        run: |
          PODSPEC="ios/.symlinks/plugins/workmanager/ios/workmanager.podspec"
          if [ -f "$PODSPEC" ]; then
            if ! grep -q "swift_version\|swift_versions" "$PODSPEC"; then
              # 在 s.source 行后插入 Swift 版本声明
              sed -i '' '/s\.source[[:space:]]*=/a\'$'\n''  s.swift_versions = "5.0"' "$PODSPEC"
              echo "✅ 已注入 swift_versions = '5.0'"
            else
              echo "✅ swift_versions 已存在"
            fi
            grep -n "swift" "$PODSPEC"
          else
            echo "⚠️ workmanager podspec 未找到"
            find ios/.symlinks -name "*.podspec" 2>/dev/null | head -20
          fi

      - name: Build iOS (unsigned)
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: App源码/ai_stock_picker
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -9qr 蓝图极智-v2.0.2-unsigned.ipa Payload/
          ls -lh 蓝图极智-v2.0.2-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-unsigned-iPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa
          retention-days: 7
