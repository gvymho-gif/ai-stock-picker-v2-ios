name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: Appжәҗз Ғ/ai_stock_picker
        run: |
          flutter clean
          flutter pub get

      - name: Build iOS Release (no codesign)
        working-directory: Appжәҗз Ғ/ai_stock_picker
        run: flutter build ios --release --no-codesign

      - name: Locate Runner.app
        id: find_app
        working-directory: Appжәҗз Ғ/ai_stock_picker
        run: |
          RUNNER=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$RUNNER" ]; then
            echo "вҡ пёҸ  Release еӨұиҙҘпјҢе°қиҜ• Debug жЁЎејҸ..."
            flutter build ios --debug --no-codesign
            RUNNER=$(find build/ios -name "Runner.app" -type d | head -1)
          fi
          echo "runner_path=$RUNNER" >> $GITHUB_OUTPUT
          echo "вң… Runner.app: $RUNNER"

      - name: Package IPA
        working-directory: Appжәҗз Ғ/ai_stock_picker
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R "${{ steps.find_app.outputs.runner_path }}" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qr "../../и“қеӣҫжһҒжҷә-v2.0.2.ipa" Payload/
          echo "вң… IPA: build/ios/и“қеӣҫжһҒжҷә-v2.0.2.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: и“қеӣҫжһҒжҷә-v2.0.2
          path: Appжәҗз Ғ/ai_stock_picker/build/ios/и“қеӣҫжһҒжҷә-v2.0.2.ipa
