name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      - name: Xcode version
        run: xcodebuild -version

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: App源码/ai_stock_picker
        run: |
          flutter clean
          flutter pub get

      - name: Build iOS Release (no codesign)
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign || flutter build ios --debug --no-codesign

      - name: Locate Runner.app
        id: find_app
        working-directory: App源码/ai_stock_picker
        run: |
          RUNNER=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "runner_path=$RUNNER" >> $GITHUB_OUTPUT

      - name: Package IPA
        working-directory: App源码/ai_stock_picker
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R "${{ steps.find_app.outputs.runner_path }}" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qr "../../蓝图极智-v2.0.2.ipa" Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 蓝图极智-v2.0.2
          path: App源码/ai_stock_picker/build/ios/蓝图极智-v2.0.2.ipa
