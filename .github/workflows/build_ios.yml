name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (unsigned IPA)
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Setup Flutter 3.0.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: 清理本地配置
        working-directory: App源码/ai_stock_picker
        run: |
          rm -f ios/Flutter/Generated.xcconfig ios/Flutter/flutter_export_environment.sh
          rm -f .flutter-plugins .flutter-plugins-dependencies ios/Podfile.lock
          rm -rf ios/Pods 2>/dev/null || true

      - name: 修复 1 - Ruby 3.x 兼容
        run: find $FLUTTER_ROOT/packages/flutter_tools/bin/ -name "podhelper*" -exec sed -i '' 's/File\.exists?/File.exist?/g' {} \;

      - name: 修复 2 - 绕过 CocoaPods Swift 校验
        run: |
          VALIDATOR=$(find /opt/homebrew/lib/ruby/gems -name "target_validator.rb" -path "*/cocoapods/*" 2>/dev/null | head -1)
          if [ -n "$VALIDATOR" ]; then
            ruby -e "
              file = ARGV[0]; lines = File.readlines(file); new_lines = []
              lines.each { |l| new_lines << l; new_lines << \"  return\n\" if l =~ /^\s*def verify_swift_pods_swift_version\b/ }
              File.write(file, new_lines.join)
            " "$VALIDATOR"
          fi

      - name: flutter pub get
        working-directory: App源码/ai_stock_picker
        run: flutter pub get

      # 复制真机 Flutter.framework 到 ios/Flutter/（供 Pods 查找 Flutter.h）
      - name: 安装 Flutter.framework 到 ios/Flutter
        working-directory: App源码/ai_stock_picker
        run: |
          DEVICE_FW="$FLUTTER_ROOT/bin/cache/artifacts/engine/ios-release/Flutter.xcframework/ios-arm64_armv7/Flutter.framework"
          if [ -d "$DEVICE_FW" ]; then
            mkdir -p ios/Flutter
            cp -R "$DEVICE_FW" ios/Flutter/Flutter.framework
            echo "✅ Flutter.framework 已复制"
            ls ios/Flutter/Flutter.framework/Headers/Flutter.h
          else
            echo "❌ 未找到"
            exit 1
          fi

      # 用 flutter build 的 --config-only 生成配置文件但不编译
      # 然后手动 pod install + 修改 Pods project + xcodebuild
      - name: flutter build --config-only
        working-directory: App源码/ai_stock_picker
        run: flutter build ios --release --no-codesign --config-only || true

      - name: pod install
        working-directory: App源码/ai_stock_picker/ios
        run: pod install

      # pod install 之后修改 Pods project，注入 FRAMEWORK_SEARCH_PATHS
      - name: 注入 FRAMEWORK_SEARCH_PATHS 到 Pods
        working-directory: App源码/ai_stock_picker/ios
        run: |
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('Pods/Pods.xcodeproj')
            project.targets.each do |target|
              target.build_configurations.each do |config|
                paths = config.build_settings['FRAMEWORK_SEARCH_PATHS'] || ['$(inherited)']
                if paths.is_a?(String)
                  paths = paths.split
                end
                paths << '\"ios/Flutter\"'
                config.build_settings['FRAMEWORK_SEARCH_PATHS'] = paths
                
                # 也注入 HEADER_SEARCH_PATHS
                hpaths = config.build_settings['HEADER_SEARCH_PATHS'] || ['$(inherited)']
                if hpaths.is_a?(String)
                  hpaths = hpaths.split
                end
                hpaths << '\"ios/Flutter/Flutter.framework/Headers\"'
                config.build_settings['HEADER_SEARCH_PATHS'] = hpaths
              end
            end
            project.save
            puts '✅ FRAMEWORK_SEARCH_PATHS + HEADER_SEARCH_PATHS 已注入'
          "

      # 直接用 xcodebuild 构建（不通过 flutter build，避免 pod install 被重跑）
      - name: xcodebuild (unsigned)
        working-directory: App源码/ai_stock_picker/ios
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=ios \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee /tmp/xcodebuild.log

      # 如果 xcodebuild 也失败了，回退到 flutter build（兜底）
      - name: 兜底 - flutter build
        working-directory: App源码/ai_stock_picker
        if: failure()
        run: |
          # 先修改 Runner project 也加上 FRAMEWORK_SEARCH_PATHS
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('ios/Runner.xcodeproj')
            project.targets.each do |target|
              target.build_configurations.each do |config|
                paths = config.build_settings['FRAMEWORK_SEARCH_PATHS'] || ['$(inherited)']
                if paths.is_a?(String)
                  paths = paths.split
                end
                paths << '\"ios/Flutter\"'
                config.build_settings['FRAMEWORK_SEARCH_PATHS'] = paths
              end
            end
            project.save
          " || true
          flutter build ios --release --no-codesign || true

      - name: Package IPA
        working-directory: App源码/ai_stock_picker/ios
        if: always()
        run: |
          # xcodebuild 默认输出到 ios/build/Build/Products/Release-iphoneos/
          # flutter build 输出到 build/ios/iphoneos/
          APP=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find ../build/ios -name "Runner.app" -type d 2>/dev/null | head -1)
          fi
          echo "App: $APP"
          if [ -z "$APP" ]; then
            echo "❌ Runner.app 未找到"
            find . -name "*.app" -type d 2>/dev/null | head -10
            find ../build -name "*.app" -type d 2>/dev/null | head -10
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -9qr ../蓝图极智-v2.0.2-unsigned.ipa Payload/
          ls -lh ../蓝图极智-v2.0.2-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 蓝图极智-unsigned-iPA
          path: App源码/ai_stock_picker/蓝图极智-v2.0.2-unsigned.ipa
          retention-days: 7
